services:
  satisfactory-server:
    container_name: satisfactory-server
    hostname: satisfactory-server
    image: wolveix/satisfactory-server:latest
    restart: unless-stopped
    ports:
      - "${SATISFACTORY_HOST_IP:-0.0.0.0}:${SATISFACTORY_GAME_TCP_HOST_PORT:-7777}:${SATISFACTORY_GAME_TCP_CONTAINER_PORT:-7777}/tcp"
      - "${SATISFACTORY_HOST_IP:-0.0.0.0}:${SATISFACTORY_GAME_UDP_HOST_PORT:-7777}:${SATISFACTORY_GAME_UDP_CONTAINER_PORT:-7777}/udp"
      - "${SATISFACTORY_HOST_IP:-0.0.0.0}:${SATISFACTORY_BEACON_HOST_PORT:-8888}:${SATISFACTORY_BEACON_CONTAINER_PORT:-8888}/tcp"
    volumes:
      - ./data/satisfactory-server:/config
    environment:
      MAXPLAYERS: ${MAXPLAYERS:-4}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      STEAMBETA: ${STEAMBETA:-false}
      SKIPUPDATE: ${SKIPUPDATE:-false}
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  dashboard:
    container_name: satisfactory-dashboard
    build: .
    restart: unless-stopped
    depends_on:
      - satisfactory-server
    ports:
      - "${DASHBOARD_HOST_IP:-0.0.0.0}:${DASHBOARD_HOST_PORT:-7634}:${DASHBOARD_CONTAINER_PORT:-80}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/dashboard:/app/data
      - ./data/satisfactory-server:/satisfactory-data:ro
    environment:
      PORT: ${DASHBOARD_CONTAINER_PORT:-80}
      APP_DATA_DIR: /app/data
      SAVE_ROOT: /satisfactory-data/saved
      WEB_ADMIN_PASSWORD: ${WEB_ADMIN_PASSWORD:-change-me-now}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-string}
      SATISFACTORY_CONTAINER_NAME: ${SATISFACTORY_CONTAINER_NAME:-satisfactory-server}
      SATISFACTORY_IMAGE: ${SATISFACTORY_IMAGE:-wolveix/satisfactory-server:latest}
      SATISFACTORY_API_PROTOCOL: ${SATISFACTORY_API_PROTOCOL:-https}
      SATISFACTORY_API_HOST: ${SATISFACTORY_API_HOST:-satisfactory-server}
      SATISFACTORY_API_PORT: ${SATISFACTORY_API_PORT:-7777}
      SATISFACTORY_API_URL: ${SATISFACTORY_API_URL:-}
      SATISFACTORY_API_TOKEN: ${SATISFACTORY_API_TOKEN:-}
      SATISFACTORY_ADMIN_PASSWORD: ${SATISFACTORY_ADMIN_PASSWORD:-}
      FRM_BASE_URL: ${FRM_BASE_URL:-}
